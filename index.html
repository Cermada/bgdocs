<!-- Theme: customization -->
  <style>
    body {
      font-family: 'Noto Sans', sans-serif;
      font-size: 15px;
    }

    table {
      border-collapse: collapse;
      border: 1px solid white;
      width: 100%;
    }

    table th,
    table td {
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 0.1rem 0.7rem;
    }

    table th {
      background: rgba(255, 255, 255, 0.06);
    }

  :root {
    --search-input-background-color: #0e1e32;
    --bg-color: #08121f;
    --sidebar-background: #0e1e32;
    --theme-color: #e24a4a;
    scroll-padding-inline-start: 200px;
    scroll-padding-inline-end: 200px;
    padding-left: 0mm;
  }
</style>
</head>
<body>
 <!-- md content-->
  <div id="app"></div>
  <script>
  
    window.$docsify = {
      plugins: [
        function pageFooter(hook, vm) {
          var footer = [
            '<hr/>',
            '<strong>Bedrock GUI Docs</strong>',
            '<br>',
            '<span><a href="https://otzr.netlify.app">Octazen Resources</a> &copy; 2026 </span>',
            '<span>all right reserved.</span>',
            '</footer>',
          ].join('');

          hook.afterEach(function (html) {
            return html + footer;
          });
        },
      ],
      name: '~Bedrock GUI Docs~',
      repo: '',
      logo: 'bedrockguidocs.svg',
      loadSidebar: true,
      subMaxLevel: 5,
      auto2top: false,
      themeable: {
          readyTransition : true, // default
          responsiveTables: true  // default
      }
    }
    
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

<!-- docsify-themeable -->
      <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
